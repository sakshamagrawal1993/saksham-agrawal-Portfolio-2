name: libertymd-care-contracts

on:
  pull_request:
    paths:
      - 'components/LibertyMD/**'
      - 'docs/libertymd/**'
      - 'governance/libertymd/**'
      - 'schemas/libertymd/**'
      - 'scripts/libertymd-*'
      - 'supabase/functions/libertymd-care-proxy/**'
      - 'supabase/migrations/*libertymd*'
      - 'supabase/tests/**'
      - 'tests/libertymd/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/libertymd-care-contracts.yml'
  push:
    branches: [main]

jobs:
  policy-and-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - name: Validate n8n response contracts
        run: npm run test:libertymd:contracts
      - name: Test deterministic clinical policy
        run: npm run test:libertymd:policy
      - name: Run ten fixed simulations
        run: npm run test:libertymd:simulations
      - name: Evaluate draft clinical scenario suite
        run: npm run test:libertymd:evaluation
      - name: Build production frontend
        run: npm run build

  database-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Prepare isolated LibertyMD database project
        run: |
          mkdir -p /tmp/libertymd-supabase
          cd /tmp/libertymd-supabase
          supabase init
          cp "$GITHUB_WORKSPACE"/supabase/migrations/*libertymd*.sql supabase/migrations/
          cp "$GITHUB_WORKSPACE"/supabase/tests/libertymd_care_rls.test.sql supabase/tests/
      - name: Start local Supabase
        working-directory: /tmp/libertymd-supabase
        run: supabase start
      - name: Run LibertyMD database tests
        working-directory: /tmp/libertymd-supabase
        run: supabase test db
      - name: Stop local Supabase
        if: always()
        working-directory: /tmp/libertymd-supabase
        run: supabase stop --no-backup
